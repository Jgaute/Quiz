*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#fff;color:#111;min-height:100vh;display:flex;justify-content:center;padding:2rem 1rem}

.qz{max-width:560px;width:100%}
h1{font-size:22px;font-weight:500;margin-bottom:0.25rem}
.sub{font-size:13px;color:#666;margin-bottom:1.5rem}
@media(prefers-color-scheme:dark){.sub{color:#999}}
.progress-bar{height:4px;background:#e0e0e0;border-radius:2px;margin-bottom:1.5rem;overflow:hidden}
@media(prefers-color-scheme:dark){.progress-bar{background:#333}}
.progress-fill{height:100%;background:#378ADD;border-radius:2px;transition:width 0.3s}
.qlabel{font-size:12px;font-weight:500;color:#888;letter-spacing:0.05em;margin-bottom:0.75rem}
.poster-wrap{width:180px;border-radius:12px;overflow:hidden;border:0.5px solid #ddd;margin-bottom:1rem}
@media(prefers-color-scheme:dark){.poster-wrap{border-color:#333}}
.poster-wrap svg{display:block}
.clues{font-size:13px;color:#666;margin-bottom:1rem;line-height:1.8}
@media(prefers-color-scheme:dark){.clues{color:#999}}
.clues b{color:#111;font-weight:500}
@media(prefers-color-scheme:dark){.clues b{color:#eee}}
.timer-bar{height:5px;background:#e0e0e0;border-radius:3px;margin-bottom:1rem;overflow:hidden}
@media(prefers-color-scheme:dark){.timer-bar{background:#333}}
.timer-fill{height:100%;border-radius:3px;transition:width 1s linear,background 1s}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-width:400px}
.opt{background:#fff;border:0.5px solid #ccc;border-radius:8px;padding:10px 14px;font-size:14px;color:#111;cursor:pointer;text-align:left}

.opt:hover:not(:disabled){background:#f5f5f5}
@media(prefers-color-scheme:dark){.opt:hover:not(:disabled){background:#2a2a2a}}
.opt.ok{background:#d4edda;border-color:#28a745;color:#155724}
.opt.no{background:#f8d7da;border-color:#dc3545;color:#721c24}
.opt.show{background:#d4edda;border-color:#28a745;color:#155724;opacity:0.55}
.fb{font-size:14px;font-weight:500;min-height:22px;margin-top:0.6rem}
.fb.ok{color:#28a745}
.fb.no{color:#dc3545}
.fb.out{color:#856404}
.nav{margin-top:1.25rem}
.nav button{background:#fff;border:0.5px solid #ccc;border-radius:8px;padding:10px 22px;font-size:14px;color:#111;cursor:pointer}
@media(prefers-color-scheme:dark){.nav button{background:#1a1a1a;border-color:#444;color:#eee}}
.nav button:hover{background:#f5f5f5}
@media(prefers-color-scheme:dark){.nav button:hover{background:#2a2a2a}}
.score-row{font-size:13px;color:#666;margin-bottom:1rem}
@media(prefers-color-scheme:dark){.score-row{color:#999}}
.score-row b{color:#111}
@media(prefers-color-scheme:dark){.score-row b{color:#eee}}
.result{text-align:center;padding:2rem 0}
.result .big{font-size:48px;font-weight:500}
.result .msg{font-size:16px;color:#666;margin-top:0.5rem}
@media(prefers-color-scheme:dark){.result .msg{color:#999}}
.result .restart{margin-top:1.5rem;background:#fff;border:0.5px solid #ccc;border-radius:8px;padding:10px 24px;font-size:14px;cursor:pointer;color:#111}
@media(prefers-color-scheme:dark){.result .restart{background:#1a1a1a;border-color:#444;color:#eee}}
.result .restart:hover{background:#f5f5f5}
@media(prefers-color-scheme:dark){.result .restart:hover{background:#2a2a2a}}
.splash{display:flex;flex-direction:column;align-items:center;text-align:center;padding:1rem 0 2rem}
.splash svg{width:100%;max-width:420px;border-radius:16px;overflow:hidden;margin-bottom:1.75rem;border:0.5px solid #ddd}
@media(prefers-color-scheme:dark){.splash svg{border-color:#333}}
.splash h2{font-size:24px;font-weight:500;margin-bottom:1rem;line-height:1.3}
.splash p{font-size:14px;color:#555;line-height:1.75;max-width:380px;margin-bottom:1.75rem}
@media(prefers-color-scheme:dark){.splash p{color:#aaa}}
.splash-btn{background:#111;color:#fff;border:none;border-radius:10px;padding:13px 32px;font-size:15px;font-weight:500;cursor:pointer;letter-spacing:0.02em;transition:opacity 0.15s}
.splash-btn:hover{opacity:0.85}
@media(prefers-color-scheme:dark){.splash-btn{background:#eee;color:#111}}
</style>

let cur=0,score=0,timer=null,timeLeft=20;

function renderQ(){
  const q=QS[cur];
  document.getElementById('qnum').textContent=cur+1;
  document.getElementById('pts').textContent=score;
  document.getElementById('prog').style.width=((cur+1)/10*100)+'%';
  document.getElementById('qlabel').textContent='FRÅGA '+(cur+1)+' AV 10';
  document.getElementById('poster').innerHTML=q.svg;
  document.getElementById('clues').innerHTML='<b>'+q.clues[0]+'</b>';
  const ob=document.getElementById('opts');
  ob.innerHTML='';
  q.opts.forEach((o,i)=>{
    const b=document.createElement('button');
    b.className='opt';
    b.textContent=o;
    b.onclick=()=>pick(i);
    ob.appendChild(b);
  });
  document.getElementById('fb').textContent='';
  document.getElementById('fb').className='fb';
  document.getElementById('nav').style.display='none';
  startTimer();
}

function startTimer(){
  timeLeft=20;
  const bar=document.getElementById('tbar');
  bar.style.transition='none';
  bar.style.width='100%';
  bar.style.background='#378ADD';
  clearInterval(timer);
  timer=setInterval(()=>{
    timeLeft--;
    const pct=Math.round(timeLeft/20*100);
    bar.style.transition='width 1s linear,background 1s';
    bar.style.width=pct+'%';
    if(timeLeft<=8) bar.style.background='#E24B4A';
    else if(timeLeft<=14) bar.style.background='#BA7517';
    if(timeLeft<=0){clearInterval(timer);timeout();}
  },1000);
}

function timeout(){
  const q=QS[cur];
  lockOpts(q.answer,-1);
  const fb=document.getElementById('fb');
  fb.textContent='Tiden tog slut! Rätt svar: '+q.title;
  fb.className='fb out';
  document.getElementById('nav').style.display='block';
}

function pick(i){
  clearInterval(timer);
  const q=QS[cur];
  lockOpts(q.answer,i);
  const fb=document.getElementById('fb');
  if(i===q.answer){
    score++;
    document.getElementById('pts').textContent=score;
    fb.textContent='Rätt! Det är '+q.title+'!';
    fb.className='fb ok';
  } else {
    fb.textContent='Fel. Rätt svar var: '+q.title;
    fb.className='fb no';
  }
  document.getElementById('nav').style.display='block';
}

function lockOpts(correct,chosen){
  const btns=document.querySelectorAll('.opt');
  btns.forEach((b,i)=>{
    b.disabled=true;
    if(i===correct && chosen!==correct) b.classList.add('show');
    if(i===chosen && chosen===correct) b.classList.add('ok');
    if(i===chosen && chosen!==correct) b.classList.add('no');
  });
}

function nextQ(){
  cur++;
  if(cur>=QS.length){showEnd();return;}
  renderQ();
}


function showEnd(){
  const msgs=['Hoppas du lärde dig något nytt!','Inte illa alls!','Bra jobbat!','Imponerande filmkoll!','Perfekt! Du är ett filmnord!'];
  const idx=Math.min(Math.floor(score/2),4);
  document.getElementById('app').innerHTML='<div class="result"><div class="big">'+score+'/10</div><div class="msg">'+msgs[idx]+'</div><button class="restart" onclick="showSplash()">Spela igen</button></div>';
}
